<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Página Não Encontrada - LidySync</title>
    <meta name="description" content="A página que você procura não existe ou foi movida.">
    <link rel="icon" type="image/x-icon" href="assets/img/favicon.ico">
    <style>
        :root {
            --bg-base: #020617;
            --bg-surface: #0f172a;
            --bg-elevated: #1e293b;
            --bg-overlay: rgba(2, 6, 23, 0.85);
            --text-primary: #f9fafb;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: rgba(255, 255, 255, 0.06);
            --glass-blur: blur(16px);
            --highlight: #06b6d4;
            --brand-gradient: linear-gradient(135deg, #5b5cf6, #7c3aed);
            --brand-shadow: 0 8px 25px rgba(91, 92, 246, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                radial-gradient(circle at 15% 50%, rgba(91, 92, 246, 0.12), transparent 35%),
                radial-gradient(circle at 85% 30%, rgba(124, 58, 237, 0.12), transparent 35%),
                radial-gradient(circle at 50% 80%, rgba(6, 182, 212, 0.08), transparent 35%);
            background-size: 50px 50px, 50px 50px, auto, auto, auto;
            background-attachment: fixed;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--text-muted);
            border-radius: 6px;
            transition: 0.2s;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--highlight);
        }

        h1,
        h2,
        h3 {
            line-height: 1.2;
            font-weight: 800;
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            width: 100%;
            padding: 16px 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(2, 6, 23, 0.7);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-bottom: 1px solid var(--border-color);
            z-index: 100;
        }

        .nav-wrapper {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        @keyframes gradientWave {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes strokeWave {
            0% {
                stroke: #5b5cf6;
            }

            50% {
                stroke: #06b6d4;
            }

            100% {
                stroke: #5b5cf6;
            }
        }

        .logo .text-gradient {
            background: linear-gradient(270deg, #5b5cf6, #06b6d4, #7c3aed, #5b5cf6);
            background-size: 300% 300%;
            animation: gradientWave 5s ease infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
        }

        .logo svg {
            animation: strokeWave 5s ease infinite;
        }

        .text-gradient-static {
            background: var(--brand-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
        }

        .nav-links {
            display: flex;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            margin-left: 24px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--highlight);
        }

        .error-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding-top: 140px;
            padding-bottom: 80px;
            gap: 24px;
            width: 100%;
        }

        .error-code {
            font-size: clamp(4rem, 10vw, 6rem);
            font-weight: 900;
            line-height: 1;
            letter-spacing: -2px;
            margin-bottom: 0;
        }

        .error-section h1 {
            font-size: clamp(1.5rem, 4vw, 2.2rem);
            margin-bottom: 8px;
        }

        .error-section p {
            font-size: clamp(0.9rem, 2vw, 1rem);
            color: var(--text-secondary);
            max-width: 500px;
            margin: 0 auto 10px;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 300px;
            background: var(--bg-surface);
            border: 2px solid var(--border-color);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            margin-bottom: 20px;
            touch-action: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #game-ui {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(2, 6, 23, 0.6);
            backdrop-filter: blur(4px);
            z-index: 10;
            transition: opacity 0.3s;
        }

        #game-ui.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .game-btn {
            background: var(--brand-gradient);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            width: 100%;
            max-width: 280px;
            text-align: center;
        }

        .btn-primary {
            background: var(--brand-gradient);
            color: #ffffff;
            box-shadow: var(--brand-shadow);
        }

        .btn-primary:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 12px 30px rgba(91, 92, 246, 0.6);
            filter: brightness(1.1);
        }

        footer {
            border-top: 1px solid var(--border-color);
            padding: 40px 24px;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            background: var(--bg-surface);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            margin-top: auto;
        }

        @media (max-width: 900px) {
            .nav-wrapper {
                justify-content: center;
            }

            .nav-links {
                display: none;
            }

            .error-section {
                padding-top: 120px;
            }
        }

        @media (max-width: 600px) {
            .container {
                padding: 0 16px;
            }

            nav {
                padding: 16px;
            }

            .error-section {
                padding-top: 100px;
            }

            .btn {
                max-width: 100%;
                width: 100%;
            }

            #game-container {
                height: 250px;
            }
        }
    </style>
</head>

<body>
    <nav>
        <div class="nav-wrapper">
            <a href="index.html" class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z">
                    </path>
                    <polygon points="10.5,9 15.5,12 10.5,15" fill="currentColor"></polygon>
                </svg>
                <span class="text-gradient">LidySync</span>
            </a>
            <div class="nav-links">
                <a href="index.html#funcionalidades">Recursos</a>
                <a href="index.html#como-funciona">Como Funciona</a>
                <a href="index.html#download" class="text-gradient-static">Download</a>
            </div>
        </div>
    </nav>
    <main class="container error-section">
        <div class="error-code text-gradient-static">404</div>
        <h1>Página não encontrada</h1>
        <p>A página que você buscou não existe ou foi movida, volte para o início ou relaxe jogando.</p>
        <div id="game-container">
            <canvas id="gameCanvas"></canvas>
            <div id="game-ui">
                <div id="ui-text" style="font-weight: 800; font-size: 1.2rem;">Flappy Popcorn 🍿</div>
                <button class="game-btn" id="start-btn">Começar</button>
                <div style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 10px;">Clique ou Espaço para
                    pular</div>
            </div>
        </div>
        <div class="error-btns" style="width: 100%; display: flex; justify-content: center;">
            <a href="index.html" class="btn btn-primary">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="m15 18-6-6 6-6" />
                </svg>
                Voltar ao Início
            </a>
        </div>
    </main>
    <footer>
        <a href="index.html" class="logo" style="margin-bottom: 12px; font-size: 20px;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path
                    d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z">
                </path>
            </svg>
            <span class="text-gradient">LidySync</span>
        </a>
        <p>Desenvolvido por Face Off & FStudio.</p>
        <p style="margin-top: 8px; font-size: 12px; opacity: 0.5;"><span id="ls-version-display">Buscando
                versão...</span></p>
    </footer>
    <script>
        async function fetchLatestVersion() {
            const versionDisplay = document.getElementById('ls-version-display');
            try {
                const response = await fetch('https://raw.githubusercontent.com/OFaceOff/LidySync/main/lidysync.user.js');
                if (!response.ok) throw new Error();
                const text = await response.text();
                const versionMatch = text.match(/\/\/\s*@version\s+([\d\.]+)/i);
                if (versionMatch && versionMatch[1]) { versionDisplay.textContent = `Versão Atual: ${versionMatch[1]}`; }
            } catch (error) { versionDisplay.textContent = `Versão Atual: Offline`; }
        }
        document.addEventListener('DOMContentLoaded', fetchLatestVersion);
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameUI = document.getElementById('game-ui');
        const startBtn = document.getElementById('start-btn');
        const uiText = document.getElementById('ui-text');
        let gameRunning = false;
        let score = 0;
        let animationId;
        const bird = { x: 50, y: 150, radius: 12, velocity: 0, gravity: 0.25, jump: -4.5 };
        let pipes = [];
        const pipeWidth = 40;
        const pipeGap = 100;
        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        function createPipe() {
            const minHeight = 50;
            const maxHeight = canvas.height - pipeGap - minHeight;
            const topHeight = Math.floor(Math.random() * (maxHeight - minHeight + 1)) + minHeight;
            pipes.push({ x: canvas.width, topHeight: topHeight, passed: false });
        }
        function resetGame() {
            bird.y = canvas.height / 2;
            bird.velocity = 0;
            pipes = [];
            score = 0;
            createPipe();
        }
        function drawBird() {
            ctx.font = "24px serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText("🍿", bird.x, bird.y);
        }
        function drawPipes() {
            pipes.forEach(pipe => {
                const grad = ctx.createLinearGradient(pipe.x, 0, pipe.x + pipeWidth, 0);
                grad.addColorStop(0, '#5b5cf6');
                grad.addColorStop(1, '#7c3aed');
                ctx.fillStyle = grad;
                ctx.fillRect(pipe.x, 0, pipeWidth, pipe.topHeight);
                ctx.fillRect(pipe.x, pipe.topHeight + pipeGap, pipeWidth, canvas.height);
            });
        }
        function update() {
            if (!gameRunning) return;
            bird.velocity += bird.gravity;
            bird.y += bird.velocity;
            if (bird.y + bird.radius > canvas.height || bird.y - bird.radius < 0) { endGame(); }
            pipes.forEach((pipe, index) => {
                pipe.x -= 2;
                if (bird.x + bird.radius > pipe.x && bird.x - bird.radius < pipe.x + pipeWidth) {
                    if (bird.y - bird.radius < pipe.topHeight || bird.y + bird.radius > pipe.topHeight + pipeGap) { endGame(); }
                }
                if (pipe.x + pipeWidth < bird.x && !pipe.passed) { pipe.passed = true; score++; }
                if (pipe.x + pipeWidth < 0) { pipes.splice(index, 1); }
            });
            if (pipes.length > 0 && pipes[pipes.length - 1].x < canvas.width - 150) { createPipe(); }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawPipes();
            drawBird();
            ctx.fillStyle = "white";
            ctx.font = "bold 20px system-ui";
            ctx.textAlign = "left";
            ctx.fillText(`Score: ${score}`, 15, 30);
            animationId = requestAnimationFrame(update);
        }
        function endGame() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            uiText.innerHTML = `Fim de Jogo! Pontos: ${score}`;
            startBtn.innerText = "Tentar Novamente";
            gameUI.classList.remove('hidden');
        }
        function handleJump() {
            if (!gameRunning) return;
            bird.velocity = bird.jump;
        }
        startBtn.addEventListener('click', () => {
            resetGame();
            gameRunning = true;
            gameUI.classList.add('hidden');
            update();
        });
        canvas.parentElement.addEventListener('mousedown', (e) => { if (gameRunning) handleJump(); });
        window.addEventListener('keydown', (e) => { if (e.code === 'Space') { e.preventDefault(); handleJump(); } });
        canvas.parentElement.addEventListener('touchstart', (e) => { e.preventDefault(); if (gameRunning) handleJump(); });
        drawBird();
    </script>
</body>

</html>
